spring:
  application:
    name: blog-api
  jackson:
    time-zone: Asia/Seoul
  data:
    web:
      pageable:
        one-indexed-parameters: true
        default-page-size: 6
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true

blog:
  api:
    base-path: /api
  admin:
    username: ${ADMIN_USERNAME:}
    password: ${ADMIN_PASSWORD:}
    display-name: ${ADMIN_DISPLAY_NAME:}

server:
  servlet:
    session:
      timeout: 24h
