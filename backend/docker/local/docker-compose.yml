services:
  mysql:
    image: mysql:8.4
    container_name: jkky-blog-mysql-local
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jkky_blog
      MYSQL_USER: blog
      MYSQL_PASSWORD: blog
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - jkky-blog-mysql-local-data:/var/lib/mysql

volumes:
  jkky-blog-mysql-local-data:
